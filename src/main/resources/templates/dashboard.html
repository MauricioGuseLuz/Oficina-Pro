<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard - OficinaPro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <span class="navbar-brand">
            OficinaPro
        </span>

    </div>

</nav>

<div class="container mt-4">

    <h2>Dashboard</h2>

    <hr>

    <div class="row">

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h5>Clientes</h5>

                    <h2 th:text="${totalClientes}"></h2>

                    <a th:href="@{/clientes}" class="btn btn-primary">
                        Abrir
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h5>Veículos</h5>

                    <h2 th:text="${totalVeiculos}"></h2>

                    <a th:href="@{/veiculos}" class="btn btn-success">
                        Abrir
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h5>Serviços</h5>

                    <h2 th:text="${totalServicos}"></h2>

                    <a th:href="@{/servicos}" class="btn btn-warning">
                        Abrir
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
