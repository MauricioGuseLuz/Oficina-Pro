<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>OficinaPro - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header text-center">

                    <h3>OficinaPro</h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/templates/login}"
                          th:object="${usuario}"
                          method="post">

                        <div class="mb-3">

                            <label>E-mail</label>

                            <input
                                    type="email"
                                    class="form-control"
                                    th:field="*{email}">

                        </div>

                        <div class="mb-3">

                            <label>Senha</label>

                            <input
                                    type="password"
                                    class="form-control"
                                    th:field="*{senha}">

                        </div>

                        <div
                                class="alert alert-danger"
                                th:if="${erro}"
                                th:text="${erro}">
                        </div>

                        <button
                                class="btn btn-primary w-100">

                            Entrar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
