<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Veículos')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">

        <h2>Veículos</h2>

        <a th:href="@{/veiculos/novo}"
           class="btn btn-primary">

            Novo Veículo

        </a>

    </div>

    <hr>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>

            <th>Placa</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Cliente</th>
            <th>Ações</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="veiculo : ${veiculos}">

            <td th:text="${veiculo.placa}"></td>

            <td th:text="${veiculo.marca}"></td>

            <td th:text="${veiculo.modelo}"></td>

            <td th:text="${veiculo.cliente.nome}"></td>

            <td>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/veiculos/editar/{id}(id=${veiculo.id})}">

                    Editar

                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/veiculos/excluir/{id}(id=${veiculo.id})}"
                   onclick="return confirm('Deseja excluir este veículo?')">

                    Excluir

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
