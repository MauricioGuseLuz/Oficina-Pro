<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Veículo')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <h2>Cadastro de Veículo</h2>

    <hr>

    <form th:action="@{/veiculos}"
          th:object="${veiculo}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">

            <label>Cliente</label>

            <select class="form-select"
                    th:field="*{cliente}">

                <option value="">Selecione...</option>

                <option th:each="cliente : ${clientes}"
                        th:value="${cliente.id}"
                        th:text="${cliente.nome}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Apelido</label>

            <input class="form-control"
                   th:field="*{apelido}">

        </div>

        <div class="mb-3">

            <label>Placa</label>

            <input class="form-control"
                   th:field="*{placa}">

        </div>

        <div class="mb-3">

            <label>Marca</label>

            <input class="form-control"
                   th:field="*{marca}">

        </div>

        <div class="mb-3">

            <label>Modelo</label>

            <input class="form-control"
                   th:field="*{modelo}">

        </div>

        <div class="row">

            <div class="col">

                <label>Ano</label>

                <input type="number"
                       class="form-control"
                       th:field="*{ano}">

            </div>

            <div class="col">

                <label>KM</label>

                <input type="number"
                       class="form-control"
                       th:field="*{quilometragem}">

            </div>

        </div>

        <br>

        <button class="btn btn-success">

            Salvar

        </button>

        <a class="btn btn-secondary"
           th:href="@{/veiculos}">

            Cancelar

        </a>

    </form>

</div>

</body>

</html>
