<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Clientes')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">

        <h2>
            Clientes
            <span class="badge bg-primary"
                  th:text="${#lists.size(clientes)}">
            </span>
        </h2>

        <a th:href="@{/clientes/novo}"
           class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Novo Cliente
        </a>

    </div>

    <hr>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Telefone</th>
            <th>CPF</th>
            <th>E-mail</th>
            <th width="180">Ações</th>
        </tr>

        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(clientes)}">

            <td colspan="6" class="text-center">

                Nenhum cliente cadastrado.

            </td>

        </tr>

        <tr th:each="cliente : ${clientes}">

            <td th:text="${cliente.id}"></td>

            <td th:text="${cliente.nome}"></td>

            <td th:text="${cliente.telefone}"></td>

            <td th:text="${cliente.cpf}"></td>

            <td th:text="${cliente.email}"></td>

            <td>

                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}"
                   class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil"></i> Editar
                </a>

                <a th:href="@{/clientes/excluir/{id}(id=${cliente.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Deseja realmente excluir este cliente?')">
                    <i class="bi bi-trash"></i> Excluir
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
